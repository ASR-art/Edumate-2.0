<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edumate - Task Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">📚 Edumate</h1>
                <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
            <p class="subtitle">Manage Your Homework Like a Pro</p>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <h2>Add a Task</h2>
                <div class="input-controls">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="taskInput" 
                            class="task-input" 
                            placeholder="Enter your task here..."
                        >
                        <button class="btn-voice" id="voiceBtn" title="Dictate Task">
                            🎤 Voice
                        </button>
                    </div>
                    
                    <div class="input-group">
                        <input 
                            type="date" 
                            id="dueDateInput" 
                            class="due-date-input"
                        >
                        <input 
                            type="time" 
                            id="reminderTimeInput" 
                            class="reminder-time-input"
                        >
                    </div>
                    
                    <div class="input-group">
                        <select id="prioritySelect" class="priority-select">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                        <button class="btn-add" id="addBtn">+ Add Task</button>
                    </div>
                </div>
                <div class="voice-status" id="voiceStatus"></div>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <h2>Filter Tasks</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="pending">📋 Pending</button>
                    <button class="filter-btn" data-filter="in-progress">⏳ In Progress</button>
                    <button class="filter-btn" data-filter="completed">✅ Completed</button>
                </div>
            </section>

            <!-- Tasks Display Section -->
            <section class="tasks-section">
                <h2>Your Tasks</h2>
                
                <!-- Stats Dashboard -->
                <div class="stats-dashboard">
                    <div class="stat-card">
                        <span class="stat-label">Total Tasks</span>
                        <span class="stat-value" id="totalTasks">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value" id="pendingCount">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">In Progress</span>
                        <span class="stat-value" id="inProgressCount">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value" id="completedCount">0</span>
                    </div>
                </div>

                <!-- Tasks List -->
                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">
                        <p>📝 No tasks yet. Start by adding your first homework!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Container -->
    <div class="notifications" id="notificationsContainer"></div>

    <script src="script.js"></script>
</body>
</html>
